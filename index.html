<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>فهرس الفصول - قانون العقوبات العام</title>
<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:Cairo,sans-serif;background:#080808;color:#f8fafc;padding:20px}
.header{text-align:center;padding:30px 0}
h1{color:#d4af37}.book-name{color:#a67c00;font-weight:bold}
.container{max-width:650px;margin:30px auto;display:flex;flex-direction:column;gap:12px}
.chapter-card{display:flex;gap:15px;align-items:center;padding:16px 20px;text-decoration:none;color:#fff;background:#141414;border:1px solid rgba(212,175,55,.15);border-radius:14px}
.chapter-icon{width:32px;height:32px;border-radius:50%;background:#d4af37;color:#080808;display:flex;align-items:center;justify-content:center;font-weight:bold}
.chapter-title{flex:1}
.telegram-btn{display:flex;justify-content:center;margin-top:25px;padding:15px;border-radius:50px;text-decoration:none;background:linear-gradient(135deg,#a67c00,#d4af37);color:#080808;font-weight:bold}
.loading{text-align:center;color:#d4af37}
</style></head>
<body>
<div class="header"><h1>فهرس فصول الكتاب</h1><div class="book-name">قانون العقوبات العام</div></div>
<div class="container" id="chapters-container"><div class="loading">جاري قراءة الفصول وعناوينها تلقائياً...</div></div>
<script>
async function loadChapters(){
const c=document.getElementById("chapters-container");c.innerHTML="";
let found=false,idx=1;
for(let i=1;i<=40;i++){
const n=i.toString().padStart(2,"0"),f=`ch${n}.html`;
try{
const r=await fetch(f);if(!r.ok)continue;
found=true;
const t=await r.text();
const m=t.match(/<title>(.*?)<\/title>/i);
let title=m?m[1].trim():`الفصل ${idx}`;
if(title.includes("ملف خاص بالتعديلات"))title=`الفصل ${idx}`;
const a=document.createElement("a");
a.className="chapter-card";a.href=f;
a.innerHTML=`<span class="chapter-icon">${idx}</span><span class="chapter-title">${title}</span>`;
c.appendChild(a);idx++;
}catch(e){}
}
if(!found){c.innerHTML='<div class="loading">لم يتم العثور على أي فصل.</div>';return;}
const tg=document.createElement("a");
tg.className="telegram-btn";tg.href="https://t.me/M5M5P";tg.target="_blank";tg.innerHTML="انضم لقناة التليجرام ✈️";
c.appendChild(tg);
}
window.onload=loadChapters;
</script>
</body></html>
